body:
  text: 大興善寺翻經院灌頂阿闍梨述凡施八方天先辦所施飲食五味雜粥稠煮勿令稀五味者粳米菉豆油麻牛乳蘇各量多少以意令其有味著少許鹽切須護淨盛於瓷盆小蠟燭十二枚磨白檀香時華清水於所施處八方各各塗一小壇小壇上先置淨碗其粥香華各各令人擎隨念誦人後念誦人先當至心啓請八方天王并其眷屬令赴道場各依本位先東方誦帝釋真言先洗清水少許即下塗香次下時華次下粥次蠟燭插於粥上次以燒香三度奉獻口誦真言兼求擁護乞天王歡喜道場主福祐次東南方火天方亦爾各誦本天真言次第而施次南方焰魔天次西南方羅剎天次西方水天次西北方風天次北方多聞天次東北方伊舍那天末後留少許餘粥多著清水於粥中著少餅子果子塗香時華總著了誦甘露真言以手印加持令人擎送淨處瀉於地上施與諸惡鬼神願擁護施主歡喜更莫回顧便須往還東方帝釋天真言此真言總須加歸命唵印捺囉二合野􅁥娑嚩二合賀東南方火天真言唵阿􅍉疙曩二合曳􅁥娑嚩二合賀南方焰摩天真言唵焰摩野􅁥娑嚩二合賀西南方羅剎天真言唵乃理底曳二合􅁥娑嚩二合賀西方水天真言唵嚩嚕拏野􅁥娑嚩二合賀西北方風天真言唵嚩野吠微閉反􅁥娑嚩二合賀北方多聞天真言唵吠無背反室囉二合摩拏野􅁥娑嚩二合賀東北方伊舍那天真言唵伊舍那野􅁥娑嚩二合賀一一位各誦本真言分明記下物次第先水次塗香次華次粥次燭次燒香諸位遍已即誦須彌王真言加持三七五七遍真言曰唵蘇迷嚕羯􅛬蠟波二合野唵素嚕素嚕鉢囉二合素嚕鉢囉二合素嚕􅁥娑嚩二合賀總施了然後洗手又施道場中發遣奉送聖衆收却供養物然後塗壇上方梵天真言如歸命唵沒囉二合憾摩二合寧寧頂反􅁥娑嚩二合賀下方地天真言唵必哩二合體地以反尾曳二合􅁥娑嚩二合賀水等六物各令一人手擎隨施者後施了者令於未施位處立如是次第切須取之燭須在意未施遍已來不得令滅矣日天真言唵一娑賀薩囉二合計囉難二吽都隸三􅁥娑嚩二合賀月天真言唵一素麼二鉢囉二合陛吽三􅁥娑嚩二合賀甘露真言曩謨蘇嚕跛野一怛他引蘖多引野二怛儞也二合他唵蘇嚕鉢囉二合蘇嚕蘇嚕􅁥娑嚩二合賀施飲食真言曩謨薩􅞣嚩怛他引蘖多引嚩路枳帝唵婆囉婆囉三婆囉三婆囉吽若人求一切吉祥之事所建道場修畢之日初夜分皆須先施八方天王及梵天地天諸宿曜鬼神等然後發遣聖衆始廢道場如是依法作者一切聖賢盡皆歡喜令得福祐所獲吉祥
